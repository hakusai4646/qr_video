<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 映像が切れない */
      display: block;
      background: #000;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="video" autoplay muted playsinline webkit-playsinline preload="auto">
      <source src="https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_3_ahu6ts.mp4" type="video/mp4">
    </video>

    <!-- どこでもタップで音ON -->
    <button class="overlay" onclick="enableSound()"></button>
  </div>

  <script>
    function enableSound() {
      const v = document.getElementById('video');
      v.muted = false;
      v.play();
      document.querySelector('.overlay').style.display = 'none';
    }
  </script>
</body>
</html>

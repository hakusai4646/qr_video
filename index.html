<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .end-screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      color: #fff;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
    }

    .end-screen p {
      font-size: 28px;
      margin-bottom: 24px;
    }

    .end-screen a {
      padding: 16px 28px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<video
  id="video"
  autoplay
  playsinline
  webkit-playsinline
  preload="auto"
></video>

<script>
  const video = document.getElementById("video");

  const playlist = [

    // ①
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/comment_tackki.mp4",

    // ②
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/SP03_hwjq9u.mp4",

    // ③ 追加
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/icy_SP_rejqjg.mp4",

    // ④
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_01_qgxbpb.mp4",

    // ⑤
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_02_akzgyu.mp4",

    // ⑥
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_03_ivwxwe.mp4",

    // ⑦
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_04_b5xlj1.mp4"
  ];

  const tiktokUrl =
    "https://www.tiktok.com/@shibu_yuu/video/7512383236824141077?is_from_webapp=1&sender_device=pc&web_id=7274534222295090690";

  // 初回は0
  let current = parseInt(
    localStorage.getItem("currentVideoIndex"),
    10
  );

  if (isNaN(current)) {
    current = 0;
  }

  // 音状態保存
  let soundOn =
    localStorage.getItem("soundOn") === "1";

  function applySound() {
    video.muted = !soundOn;
    video.volume = 1;
  }

  function playVideo(index) {

    current = index;

    video.src = playlist[current];

    applySound();

    video.load();

    video.onloadeddata = () => {
      video.play().catch(() => {});
    };
  }

  // 最初再生
  playVideo(current);

  // タップで音ON
  function enableSound() {

    soundOn = true;

    localStorage.setItem(
      "soundOn",
      "1"
    );

    applySound();

    video.play().catch(() => {});
  }

  document.addEventListener(
    "click",
    enableSound,
    { once: true }
  );

  document.addEventListener(
    "touchstart",
    enableSound,
    { once: true }
  );

  // 動画終了
  video.addEventListener("ended", () => {

    // 最後ならTikTok導線
    if (current === playlist.length - 1) {

      localStorage.setItem(
        "currentVideoIndex",
        "0"
      );

      document.body.innerHTML = `
        <div class="end-screen">

          <p>TikTokも見てね</p>

          <a href="${tiktokUrl}">
            TikTokを見る
          </a>

        </div>
      `;

      return;
    }

    // 次動画
    current++;

    localStorage.setItem(
      "currentVideoIndex",
      current
    );

    playVideo(current);
  });

  // リロード時も次へ
  window.addEventListener("pagehide", () => {

    // 最後以外
    if (current < playlist.length - 1) {

      localStorage.setItem(
        "currentVideoIndex",
        current + 1
      );

    } else {

      // 最後なら最初へ
      localStorage.setItem(
        "currentVideoIndex",
        "0"
      );
    }
  });
</script>

</body>
</html>

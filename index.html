<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .end-screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: sans-serif;
    }

    .end-screen p {
      font-size: 28px;
      margin-bottom: 24px;
    }

    .end-screen a {
      padding: 16px 28px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>

<script>
  const video = document.getElementById("video");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/comment_tackki.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_hwjq9u.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_01_qgxbpb.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_02_akzgyu.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_03_ivwxwe.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_04_b5xlj1.mp4"
  ];

  const tiktokUrl = "https://www.tiktok.com/@shibu_yuu/video/7512383236824141077?is_from_webapp=1&sender_device=pc&web_id=7274534222295090690";

  const hasVisited = sessionStorage.getItem("hasVisited");
  let current;

  if (!hasVisited) {
    current = 0;
    sessionStorage.setItem("hasVisited", "1");
    localStorage.setItem("currentVideoIndex", 0);
  } else {
    current = parseInt(localStorage.getItem("currentVideoIndex"), 10);
    if (isNaN(current) || current >= playlist.length) current = 0;
  }

  function playCurrent() {
    video.src = playlist[current];
    video.load();

    video.play().catch(() => {});
  }

  function showEndScreen() {
    localStorage.setItem("currentVideoIndex", 0);

    document.body.innerHTML = `
      <div class="end-screen">
        <p>TikTokも見てね</p>
        <a href="${tiktokUrl}">TikTokを見る</a>
      </div>
    `;
  }

  function nextVideo() {
    if (current >= playlist.length - 1) {
      showEndScreen();
      return;
    }

    current++;
    localStorage.setItem("currentVideoIndex", current);
    playCurrent();
  }

  video.addEventListener("loadeddata", () => {
    video.play().catch(() => {});
  });

  video.addEventListener("ended", nextVideo);

  window.addEventListener("pagehide", () => {
    if (current < playlist.length - 1) {
      localStorage.setItem("currentVideoIndex", current + 1);
    }
  });

  document.addEventListener("click", () => {
    video.muted = false;
    video.volume = 1;
    video.play().catch(() => {});
  }, { once: true });

  document.addEventListener("touchstart", () => {
    video.muted = false;
    video.volume = 1;
    video.play().catch(() => {});
  }, { once: true });

  playCurrent();
</script>

</body>
</html>

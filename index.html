<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Play</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      width: 100%;
      max-width: 720px;
      text-align: center;
    }
    video {
      width: 100%;
      max-height: 80vh;
      background: #000;
    }
    button, a {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      border-radius: 999px;
      background: #ff0050;
      color: #fff;
      text-decoration: none;
      border: 0;
      font-size: 16px;
      font-weight: 700;
    }
    #tiktok {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="video" controls autoplay playsinline></video>

    <a id="tiktok"
       href="https://www.tiktok.com/@shibu_yuu/video/7512383236824141077"
       target="_blank"
       rel="noopener">
      TikTokも見てね
    </a>
  </div>

  <script>
    const cloudName = "YOUR_CLOUD_NAME"; // ← ここだけ変更

    const videos = [
      "comment_tackki",
      "SP03_hwjq9u",
      "kakko_01_qgxbpb",
      "kakko_02_akzgyu",
      "kakko_03_ivwxwe",
      "kakko_04_b5xlj1"
    ];

    const videoEl = document.getElementById("video");
    const tiktokEl = document.getElementById("tiktok");

    const key = "currentVideoIndex";
    let index = Number(localStorage.getItem(key) || 0);

    if (index >= videos.length) {
      videoEl.style.display = "none";
      tiktokEl.style.display = "inline-block";
      localStorage.removeItem(key);
    } else {
      const publicId = videos[index];

      videoEl.src =
        `https://res.cloudinary.com/${cloudName}/video/upload/${publicId}.mp4`;

      localStorage.setItem(key, index + 1);
    }
  </script>
</body>
</html>

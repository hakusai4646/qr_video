<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>

<script>
  const v = document.getElementById("video");

  // 公開開始：2026年5月1日 17:00（日本時間）
  const startTime = new Date("2026-05-01T17:00:00+09:00");

  // あとでファイル名・URLをここに追記
  const playlist = [
    // "1つ目の動画ファイル名またはURL",
    // "2つ目の動画ファイル名またはURL"
  ];

  const now = new Date();

  if (now >= startTime && playlist.length > 0) {
    let lastIndex = localStorage.getItem("lastVideoIndex");
    lastIndex = lastIndex ? parseInt(lastIndex) : -1;

    let nextIndex = (lastIndex + 1) % playlist.length;
    localStorage.setItem("lastVideoIndex", nextIndex);

    v.src = playlist[nextIndex];
    v.play();

    v.addEventListener("ended", () => {
      nextIndex = (nextIndex + 1) % playlist.length;
      localStorage.setItem("lastVideoIndex", nextIndex);
      v.src = playlist[nextIndex];
      v.play();
    });
  }
</script>

</body>
</html>

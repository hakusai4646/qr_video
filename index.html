<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }
    #message {
      position: absolute;
      font-size: 22px;
      text-align: center;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>

<div id="message" style="display:none;">
  この動画は公開終了しました
</div>

<script>
  const v = document.getElementById("video");
  const msg = document.getElementById("message");

  // ★ 日本時間で固定（JST = UTC+9）
  const deadline = new Date(Date.UTC(2026, 4, 31, 14, 59, 0));
  // ↑ 2026/05/31 23:59 JST = 14:59 UTC

  function isExpired() {
    return new Date() >= deadline;
  }

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/comment_tackki.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_hwjq9u.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_01_qgxbpb.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_02_akzgyu.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_03_ivwxwe.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_04_b5xlj1.mp4"
  ];

  let current = 0;
  let soundOn = false;
  let changing = false;

  function playVideo() {
    if (isExpired()) {
      v.pause();
      v.style.display = "none";
      msg.style.display = "block";
      return;
    }

    changing = false;
    v.src = playlist[current];
    v.load();

    if (soundOn) {
      v.muted = false;
      v.volume = 1.0;
    }

    v.play().catch(() => {});
  }

  function nextVideo() {
    if (changing || isExpired()) return;

    changing = true;
    current = (current + 1) % playlist.length;

    setTimeout(() => {
      playVideo();
    }, 300);
  }

  function enableSound() {
    if (isExpired()) return;

    soundOn = true;
    v.muted = false;
    v.volume = 1.0;
    v.play().catch(() => {});
  }

  document.body.addEventListener("touchstart", enableSound, { once: true });
  document.body.addEventListener("click", enableSound, { once: true });

  v.addEventListener("ended", nextVideo);

  v.addEventListener("timeupdate", () => {
    if (isExpired()) {
      playVideo();
      return;
    }

    if (!isNaN(v.duration) && v.duration > 0) {
      if (v.currentTime >= v.duration - 0.3) {
        nextVideo();
      }
    }
  });

  v.addEventListener("error", nextVideo);

  // 初回チェック
  if (isExpired()) {
    v.style.display = "none";
    msg.style.display = "block";
  } else {
    playVideo();
  }
</script>

</body>
</html>

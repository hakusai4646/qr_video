<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>

<script>
  const v = document.getElementById("video");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_3_ahu6ts.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/%E3%82%AB%E3%83%83%E3%82%B3%E3%82%A4%E3%82%A4_1_1_w1ouma.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/%E3%82%AB%E3%83%83%E3%82%B3%E3%82%A4%E3%82%A4_2_1_zocz8w.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/%E3%82%AB%E3%83%83%E3%82%B3%E3%82%A4%E3%82%A4_3_krf1nk.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/%E3%82%AB%E3%83%83%E3%82%B3%E3%82%A4%E3%82%A4_4_hjsxcv.mp4"
  ];

  let current = 0;
  let soundOn = false;

  function playVideo(i) {
    v.src = playlist[i];
    v.load();
    v.muted = !soundOn;
    v.play().catch(()=>{});
  }

  // タップで音ON（以降ずっと音あり）
  function enableSound() {
    soundOn = true;
    v.muted = false;
    v.volume = 1.0;
    v.play().catch(()=>{});
  }

  document.body.addEventListener("touchstart", enableSound, { once: true });
  document.body.addEventListener("click", enableSound, { once: true });

  // 終わったら次へ
  v.addEventListener("ended", () => {
    current = (current + 1) % playlist.length;
    playVideo(current);
  });

  // 最初の動画
  playVideo(current);
</script>

</body>
</html>

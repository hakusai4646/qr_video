<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Movie Player</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100vw;
      height:100vh;
      background:#000;
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }
  </style>
</head>

<body>

  <video
    id="video"
    autoplay
    controls
    playsinline
    webkit-playsinline
  ></video>

  <script>
    /*
      まずこれで復旧する
      Cloudinary名だけ入れる
    */

    const cloudName = "YOUR_CLOUD_NAME";

    /*
      ここは今まで通り
    */

    const videos = [
      "comment_tackki",
      "SP03_hwjq9u",
      "kakko_01_qgxbpb",
      "kakko_02_akzgyu",
      "kakko_03_ivwxwe",
      "kakko_04_b5xlj1"
    ];

    /*
      localStorage完全停止
      まず動画再生だけ戻す
    */

    const video = document.getElementById("video");

    /*
      まず1本目固定
    */

    const firstVideo = videos[0];

    video.src =
      `https://res.cloudinary.com/${cloudName}/video/upload/${firstVideo}.mp4`;

    video.load();

    video.play().catch(() => {});
  </script>

</body>
</html>

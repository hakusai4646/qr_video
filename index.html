<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Movie Player</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    #tiktokBtn {
      display: none;

      position: absolute;
      z-index: 10;

      padding: 16px 28px;
      border-radius: 9999px;

      background: #ff0050;
      color: #fff;

      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <video
      id="videoPlayer"
      autoplay
      controls
      playsinline
      webkit-playsinline
    ></video>

    <a
      id="tiktokBtn"
      href="https://www.tiktok.com/@shibu_yuu/video/7512383236824141077"
      target="_blank"
      rel="noopener"
    >
      TikTokも見てね
    </a>

  </div>

  <script>
    /*
      ============================
      Cloudinary設定
      ============================
    */

    const cloudName = "YOUR_CLOUD_NAME";

    /*
      ============================
      動画リスト
      ============================
    */

    const videos = [
      "comment_tackki",
      "SP03_hwjq9u",
      "kakko_01_qgxbpb",
      "kakko_02_akzgyu",
      "kakko_03_ivwxwe",
      "kakko_04_b5xlj1"
    ];

    /*
      ============================
      要素取得
      ============================
    */

    const videoPlayer = document.getElementById("videoPlayer");
    const tiktokBtn = document.getElementById("tiktokBtn");

    /*
      ============================
      保存キー
      ============================
    */

    const STORAGE_KEY = "currentVideoIndex";

    /*
      ============================
      index取得
      ============================
    */

    let currentIndex = Number(localStorage.getItem(STORAGE_KEY));

    if (
      !Number.isInteger(currentIndex) ||
      currentIndex < 0
    ) {
      currentIndex = 0;
    }

    /*
      ============================
      動画読み込み
      ============================
    */

    function loadVideo(index) {

      // 最後まで行った
      if (index >= videos.length) {

        videoPlayer.style.display = "none";

        tiktokBtn.style.display = "inline-block";

        localStorage.removeItem(STORAGE_KEY);

        return;
      }

      const publicId = videos[index];

      const videoUrl =
        `https://res.cloudinary.com/${cloudName}/video/upload/${publicId}.mp4`;

      videoPlayer.src = videoUrl;

      videoPlayer.load();

      videoPlayer.play().catch(() => {});
    }

    /*
      ============================
      初回ロード
      ============================
    */

    loadVideo(currentIndex);

    /*
      ============================
      再生終了時
      ============================
    */

    videoPlayer.addEventListener("ended", () => {

      currentIndex++;

      localStorage.setItem(
        STORAGE_KEY,
        String(currentIndex)
      );

      loadVideo(currentIndex);
    });

  </script>

</body>
</html>

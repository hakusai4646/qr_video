<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline webkit-playsinline></video>

<script>
  const v = document.getElementById("video");

  // ★ここに4本の動画URLを入れる（Cloudinaryの.mp4直リンク）
  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/test2_rzo70e.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/RPReplay_Final1610172217_hqb3sn.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_3_ahu6ts.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/video_yu_inb2rm.mp4"
  ];

  let soundOn = false;
  let lastIndex = -1;

  function getRandomIndex() {
    let i;
    do {
      i = Math.floor(Math.random() * playlist.length);
    } while (playlist.length > 1 && i === lastIndex);
    lastIndex = i;
    return i;
  }

  function playRandom() {
    const i = getRandomIndex();
    v.src = playlist[i];
    v.load();
    v.muted = !soundOn;
    v.play().catch(()=>{});
  }

  // タップで音ON（以降ずっと音あり）
  function enableSound() {
    soundOn = true;
    v.muted = false;
    v.volume = 1.0;
    v.play().catch(()=>{});
  }

  document.body.addEventListener("touchstart", enableSound, { once: true });
  document.body.addEventListener("click", enableSound, { once: true });

  // 終わるたびにランダム再生
  v.addEventListener("ended", () => {
    playRandom();
  });

  // 初回
  playRandom();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>

<script>
  const v = document.getElementById("video");

  // 切り替え時刻（日本時間 2026-04-21 11:30）
  const switchTime = new Date("2026-04-21T11:30:00+09:00");

  function getPlaylist() {
    const now = new Date();

    // 切替前
    if (now < switchTime) {
      return [
        "https://res.cloudinary.com/dl06u7sqw/video/upload/video_yu_inb2rm.mp4",
        "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_3_ahu6ts.mp4"
      ];
    }

    // 切替後
    return [
      "https://res.cloudinary.com/dl06u7sqw/video/upload/test2_rzo70e.mp4"
    ];
  }

  let playlist = getPlaylist();
  let current = 0;

  function playVideo(i) {
    v.src = playlist[i];
    v.play().catch(()=>{});
  }

  v.addEventListener("ended", () => {
    current = (current + 1) % playlist.length;
    playVideo(current);
  });

  playVideo(current);

  // 30秒ごとにチェックして切り替え
  setInterval(() => {
    const newPlaylist = getPlaylist();

    if (JSON.stringify(newPlaylist) !== JSON.stringify(playlist)) {
      playlist = newPlaylist;
      current = 0;
      playVideo(current);
    }
  }, 30000);
</script>

</body>
</html>

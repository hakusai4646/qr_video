<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>
    <button class="overlay" onclick="enableSound()"></button>
  </div>

  <script>
    const playlist = [
      "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264/video_yu_inb2rm.mp4",
      "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_3_ahu6ts.mp4"
    ];

    let current = 0;
    let soundOn = false;
    const v = document.getElementById("video");

    function playVideo(i) {
      v.src = playlist[i];
      v.load();
      v.muted = !soundOn;
      v.play().catch(()=>{});
    }

    function enableSound() {
      soundOn = true;
      v.muted = false;
      v.play().catch(()=>{});
      document.querySelector(".overlay").style.display = "none";
    }

    v.addEventListener("ended", () => {
      current = (current + 1) % playlist.length;
      playVideo(current);
    });

    playVideo(current);
  </script>
</body>
</html>

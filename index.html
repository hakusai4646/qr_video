<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 全体を見せたいなら contain。画面いっぱい優先なら cover */
      background: #000;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <video
      autoplay
      muted
      playsinline
      webkit-playsinline
      preload="auto"
      disablepictureinpicture
      controlslist="nodownload noplaybackrate noremoteplayback"
    >
      <source src="video_yu.mp4" type="video/mp4" />
    </video>
  </div>
</body>
</html>

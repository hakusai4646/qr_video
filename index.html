<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2E0VMFCTM2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-2E0VMFCTM2");
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .end-screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .end-screen p {
      font-size: 28px;
      margin-bottom: 24px;
    }

    .end-screen a {
      padding: 16px 28px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<video
  id="video"
  autoplay
  muted
  playsinline
  webkit-playsinline
  preload="auto"
></video>

<script>
  const video = document.getElementById("video");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/comment_tackki.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/0501_off2_2_e6wqit.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/SP03_hwjq9u.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/icy_SP_rejqjg.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/omake_1_nnekji.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/live_1_jvvqw5.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_01_qgxbpb.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_02_akzgyu.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_03_ivwxwe.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_04_b5xlj1.mp4"
  ];

  const tiktokUrl = "https://www.tiktok.com/@shibu_yuu/video/7512383236824141077";

  let current = parseInt(sessionStorage.getItem("nextVideoIndex") || "0", 10);

  if (isNaN(current) || current < 0 || current >= playlist.length) {
    current = 0;
  }

  let soundOn = sessionStorage.getItem("soundOn") === "1";

  function saveNextIndex() {
    sessionStorage.setItem(
      "nextVideoIndex",
      String((current + 1) % playlist.length)
    );
  }

  function track(name) {
    if (typeof gtag === "function") {
      gtag("event", name, {
        video_index: current + 1,
        video_url: playlist[current]
      });
    }
  }

  function applySound() {
    video.volume = 1;

    if (soundOn) {
      video.muted = false;
      video.removeAttribute("muted");
    } else {
      video.muted = true;
      video.setAttribute("muted", "");
    }
  }

  function playCurrentVideo() {
    saveNextIndex();

    video.src = playlist[current];
    applySound();
    video.load();

    video.oncanplay = () => {
      video.play().then(() => {
        track("video_play");
      }).catch(() => {
        video.muted = true;
        video.setAttribute("muted", "");
        video.play().catch(() => {});
      });
    };
  }

  function enableSound() {
    soundOn = true;
    sessionStorage.setItem("soundOn", "1");

    video.muted = false;
    video.removeAttribute("muted");
    video.volume = 1;

    video.play().catch(() => {});
    track("sound_enabled");
  }

  function showEndScreen() {
    sessionStorage.setItem("nextVideoIndex", "0");

    track("tiktok_button_show");

    document.body.innerHTML = `
      <div class="end-screen">
        <p>TikTokも見てね</p>
        <a href="${tiktokUrl}" target="_blank" rel="noopener" id="tiktokLink">
          TikTokを見る
        </a>
      </div>
    `;

    document.getElementById("tiktokLink").addEventListener("click", () => {
      if (typeof gtag === "function") {
        gtag("event", "tiktok_click");
      }
    });
  }

  video.addEventListener("ended", () => {
    track("video_end");

    current++;

    if (current >= playlist.length) {
      showEndScreen();
      return;
    }

    playCurrentVideo();
  });

  document.addEventListener("pointerdown", enableSound, { once: true });
  document.addEventListener("touchstart", enableSound, { once: true });

  playCurrentVideo();
</script>

</body>
</html>

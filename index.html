<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    #debug {
      position: fixed;
      bottom: 0;
      left: 0;
      color: #0f0;
      font-size: 12px;
      background: rgba(0,0,0,0.7);
      padding: 5px;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>
<div id="debug"></div>

<script>
  const v = document.getElementById("video");
  const debug = document.getElementById("debug");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_3_ahu6ts.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_01_ot7sge.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_02_xfnuu8.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_03_vqukvf.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_04_iptt9e.mp4"
  ];

  let current = 0;
  let soundOn = false;

  function log(msg) {
    debug.innerText = msg;
    console.log(msg);
  }

  function playVideo(i) {
    const url = playlist[i];
    log("再生中: " + url);

    v.src = url;
    v.load();
    v.muted = !soundOn;

    v.play().then(()=>{
      log("再生成功: " + url);
    }).catch(err=>{
      log("再生失敗: " + url);
      nextVideo();
    });
  }

  function nextVideo() {
    current = (current + 1) % playlist.length;
    playVideo(current);
  }

  function enableSound() {
    soundOn = true;
    v.muted = false;
    v.volume = 1.0;
    v.play().catch(()=>{});
  }

  document.body.addEventListener("click", enableSound, { once: true });
  document.body.addEventListener("touchstart", enableSound, { once: true });

  v.addEventListener("ended", () => {
    log("終了 → 次へ");
    nextVideo();
  });

  v.addEventListener("error", () => {
    log("エラー発生 → 次へ");
    nextVideo();
  });

  playVideo(current);
</script>

</body>
</html>

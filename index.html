<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>

<video
  id="video"
  autoplay
  muted
  playsinline
  webkit-playsinline
  preload="auto"
></video>

<script>
  const video = document.getElementById("video");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/comment_tackki.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_hwjq9u.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_01_qgxbpb.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_02_akzgyu.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_03_ivwxwe.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_04_b5xlj1.mp4"
  ];

  let current = Number(localStorage.getItem("currentVideoIndex"));

  if (Number.isNaN(current) || current < 0 || current >= playlist.length) {
    current = 0;
  }

  video.src = playlist[current];

  const next = (current + 1) % playlist.length;
  localStorage.setItem("currentVideoIndex", next);

  function forcePlay() {
    video.muted = true;
    video.playsInline = true;
    video.play().catch(() => {
      setTimeout(forcePlay, 500);
    });
  }

  video.addEventListener("loadedmetadata", forcePlay);
  video.addEventListener("canplay", forcePlay);

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      forcePlay();
    }
  });

  window.addEventListener("pageshow", forcePlay);

  forcePlay();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>

<script>
  const v = document.getElementById("video");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/test2_rzo70e.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/RPReplay_Final1610172217_hqb3sn.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_3_ahu6ts.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/video_yu_inb2rm.mp4"
  ];

  let soundOn = false;

  // 前回のインデックス取得
  let lastIndex = localStorage.getItem("lastVideoIndex");
  lastIndex = lastIndex ? parseInt(lastIndex) : -1;

  // 次の動画を決定（順番に回す）
  let nextIndex = (lastIndex + 1) % playlist.length;

  // 保存
  localStorage.setItem("lastVideoIndex", nextIndex);

  function playVideo(i) {
    v.src = playlist[i];
    v.load();
    v.muted = !soundOn;
    v.play().catch(()=>{});
  }

  function enableSound() {
    soundOn = true;
    v.muted = false;
    v.play().catch(()=>{});
  }

  document.body.addEventListener("click", enableSound, { once: true });
  document.body.addEventListener("touchstart", enableSound, { once: true });

  playVideo(nextIndex);
</script>

</body>
</html>

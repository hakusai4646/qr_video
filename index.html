<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2E0VMFCTM2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'G-2E0VMFCTM2');
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    #tiktokButton {
      display: none;
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 30px;
      background: #ff0050;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 999px;
      z-index: 100;
    }
  </style>
</head>

<body>

<video
  id="video"
  autoplay
  muted
  playsinline
  webkit-playsinline
  preload="auto"
></video>

<a
  id="tiktokButton"
  href="https://www.tiktok.com/@shibu_yuu/video/7512383236824141077"
  target="_blank"
  rel="noopener"
>
  TikTokも見てね
</a>

<script>
  const v = document.getElementById("video");
  const tiktokButton = document.getElementById("tiktokButton");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/comment_tackki.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_hwjq9u.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_01_qgxbpb.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_02_akzgyu.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_03_ivwxwe.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_04_b5xlj1.mp4"
  ];

  let current = parseInt(localStorage.getItem("currentVideo") || "0", 10);
  let soundOn = localStorage.getItem("soundOn") === "true";

  if (isNaN(current) || current < 0 || current >= playlist.length) {
    current = 0;
    localStorage.setItem("currentVideo", "0");
  }

  function sendEvent(name) {
    if (typeof gtag === "function") {
      gtag("event", name, {
        video_number: current + 1,
        video_url: playlist[current]
      });
    }
  }

  function playVideo() {
    v.src = playlist[current];

    if (soundOn) {
      v.muted = false;
      v.volume = 1.0;
    } else {
      v.muted = true;
    }

    v.load();

    v.play().then(() => {
      sendEvent("video_play");
    }).catch(() => {
      v.muted = true;
      v.play().catch(() => {});
    });
  }

  function enableSound() {
    soundOn = true;
    localStorage.setItem("soundOn", "true");

    v.muted = false;
    v.volume = 1.0;

    v.play().catch(() => {});
  }

  function showTikTokButton() {
    localStorage.setItem("currentVideo", "0");

    v.pause();
    v.style.display = "none";

    tiktokButton.style.display = "block";

    if (typeof gtag === "function") {
      gtag("event", "tiktok_button_show");
    }
  }

  document.body.addEventListener("touchstart", enableSound, { once: true });
  document.body.addEventListener("click", enableSound, { once: true });

  v.addEventListener("ended", () => {
    sendEvent("video_end");

    if (current === playlist.length - 1) {
      showTikTokButton();
      return;
    }

    current++;

    localStorage.setItem("currentVideo", String(current));

    location.reload();
  });

  playVideo();
</script>

</body>
</html>

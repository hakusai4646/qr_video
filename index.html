<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline webkit-playsinline></video>

<script>
  const v = document.getElementById("video");

  // 12:50で切り替え
  const switchTime = new Date();
  switchTime.setHours(12, 50, 0, 0);

  function getPlaylist() {
    const now = new Date();

    // 切替前
    if (now < switchTime) {
      return [
        "https://res.cloudinary.com/dl06u7sqw/video/upload/test2_rzo70e.mp4"
      ];
    }

    // 切替後
    return [
      "https://res.cloudinary.com/dl06u7sqw/video/upload/RPReplay_Final1610172217_hqb3sn.mp4"
    ];
  }

  let playlist = getPlaylist();
  let current = 0;
  let soundOn = false;

  function playVideo(i) {
    v.src = playlist[i];
    v.load();
    v.muted = !soundOn;
    v.play().catch(()=>{});
  }

  function enableSound() {
    soundOn = true;
    v.muted = false;
    v.volume = 1.0;
    v.play().catch(()=>{});
  }

  document.body.addEventListener("touchstart", enableSound, { once: true });
  document.body.addEventListener("click", enableSound, { once: true });

  v.addEventListener("ended", () => {
    current = (current + 1) % playlist.length;
    playVideo(current);
  });

  // 10秒ごとにチェックして切り替え
  setInterval(() => {
    const newPlaylist = getPlaylist();
    if (JSON.stringify(newPlaylist) !== JSON.stringify(playlist)) {
      playlist = newPlaylist;
      current = 0;
      playVideo(current);
    }
  }, 10000);

  playVideo(current);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .end-screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: sans-serif;
    }

    .end-screen p {
      font-size: 28px;
      margin-bottom: 24px;
    }

    .end-screen a {
      padding: 16px 28px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<video
  id="video"
  autoplay
  muted
  playsinline
  webkit-playsinline
  preload="auto"
></video>

<script>
  const video = document.getElementById("video");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/comment_tackki.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/SP03_hwjq9u.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_01_qgxbpb.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_02_akzgyu.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_03_ivwxwe.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/f_mp4,vc_h264,ac_aac/kakko_04_b5xlj1.mp4"
  ];

  const tiktokUrl = "https://www.tiktok.com/@shibu_yuu/video/7512383236824141077?is_from_webapp=1&sender_device=pc&web_id=7274534222295090690";

  let current;

  if (!sessionStorage.getItem("startedThisSession")) {
    current = 0;
    sessionStorage.setItem("startedThisSession", "1");
    localStorage.setItem("currentVideoIndex", 0);
  } else {
    current = Number(localStorage.getItem("currentVideoIndex"));

    if (Number.isNaN(current) || current < 0 || current >= playlist.length) {
      current = 0;
    }
  }

  function saveReloadNext() {
    if (current < playlist.length - 1) {
      localStorage.setItem("currentVideoIndex", current + 1);
    } else {
      localStorage.setItem("currentVideoIndex", 0);
    }
  }

  function playVideo() {
    video.src = playlist[current];
    video.load();

    saveReloadNext();

    video.play().catch(() => {});
  }

  function showEndScreen() {
    localStorage.setItem("currentVideoIndex", 0);

    document.body.innerHTML = `
      <div class="end-screen">
        <p>TikTokも見てね</p>
        <a href="${tiktokUrl}">TikTokを見る</a>
      </div>
    `;
  }

  video.addEventListener("ended", () => {
    if (current >= playlist.length - 1) {
      showEndScreen();
      return;
    }

    current++;
    playVideo();
  });

  function enableSound() {
    video.muted = false;
    video.volume = 1;
    video.play().catch(() => {});
  }

  document.addEventListener("click", enableSound, { once: true });
  document.addEventListener("touchstart", enableSound, { once: true });

  playVideo();
</script>

</body>
</html>

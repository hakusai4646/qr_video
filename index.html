<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    #tiktokButton {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      padding: 16px 28px;
      font-size: 18px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      font-weight: bold;
      z-index: 10;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>

<button id="tiktokButton">TikTokも見てね</button>

<script>
  const v = document.getElementById("video");
  const tiktokButton = document.getElementById("tiktokButton");

  const playlist = [
    "https://res.cloudinary.com/dl06u7sqw/video/upload/comment_tackki.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/SP03_hwjq9u.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_01_qgxbpb.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_02_akzgyu.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_03_ivwxwe.mp4",
    "https://res.cloudinary.com/dl06u7sqw/video/upload/kakko_04_b5xlj1.mp4"
  ];

  const tiktokUrl = "https://www.tiktok.com/@shibu_yuu/video/7512383236824141077";

  let current = 0;
  let soundOn = false;

  function playVideo() {
    tiktokButton.style.display = "none";
    v.src = playlist[current];
    v.load();

    if (soundOn) {
      v.muted = false;
      v.volume = 1.0;
    }

    v.play().catch(() => {});
  }

  function enableSound() {
    soundOn = true;
    v.muted = false;
    v.volume = 1.0;
    v.play().catch(() => {});
  }

  document.body.addEventListener("touchstart", enableSound, { once: true });
  document.body.addEventListener("click", enableSound, { once: true });

  v.addEventListener("ended", () => {
    if (current >= playlist.length - 1) {
      tiktokButton.style.display = "block";
      return;
    }

    current++;
    playVideo();
  });

  tiktokButton.addEventListener("click", () => {
    window.location.href = tiktokUrl;
  });

  playVideo();
</script>

</body>
</html>
